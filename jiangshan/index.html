<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 江珊 💖</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose-100: oklch(0.96 0.03 0);
    --rose-200: oklch(0.90 0.07 2);
    --rose-300: oklch(0.83 0.12 4);
    --rose-400: oklch(0.72 0.18 6);
    --rose-500: oklch(0.60 0.24 8);
    --rose-600: oklch(0.48 0.22 10);
    --rose-700: oklch(0.35 0.18 12);
  }

  body {
    min-height: 100vh;
    background: oklch(0.18 0.04 0);
    font-family: 'PingFang SC', 'Microsoft YaHei', 'HarmonyOS Sans', sans-serif;
    overflow-x: hidden;
    cursor: default;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  /* ── 星空粒子背景 ── */
  #particleCanvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  /* ── 主容器 ── */
  .main-stage {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    padding: clamp(24px, 5vw, 60px);
    width: 100%; max-width: 900px;
  }

  /* ── 光环 ── */
  .aura-ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid oklch(0.65 0.22 8 / 0.25);
    animation: auraPulse 4s ease-in-out infinite;
    pointer-events: none;
  }
  .aura-ring:nth-child(1) {
    width: clamp(200px, 40vw, 500px); height: clamp(200px, 40vw, 500px);
    animation-delay: 0s;
  }
  .aura-ring:nth-child(2) {
    width: clamp(260px, 52vw, 650px); height: clamp(260px, 52vw, 650px);
    animation-delay: 1.2s; border-color: oklch(0.60 0.26 350 / 0.18);
  }
  .aura-ring:nth-child(3) {
    width: clamp(320px, 64vw, 800px); height: clamp(320px, 64vw, 800px);
    animation-delay: 2.4s; border-color: oklch(0.55 0.30 340 / 0.10);
  }
  @keyframes auraPulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  /* ── 名字区域 ── */
  .name-shrine {
    position: relative;
    margin: clamp(30px, 6vw, 60px) 0;
    z-index: 2;
  }

  .name-main {
    font-size: clamp(80px, 20vw, 240px);
    font-weight: 900;
    letter-spacing: clamp(8px, 3vw, 30px);
    text-align: center;
    line-height: 1;
    position: relative;
    /* 霓虹发光 */
    color: oklch(0.92 0.08 5);
    text-shadow:
      0 0 7px oklch(0.65 0.30 8),
      0 0 10px oklch(0.65 0.30 8),
      0 0 21px oklch(0.60 0.28 8),
      0 0 42px oklch(0.55 0.28 10),
      0 0 82px oklch(0.50 0.26 12),
      0 0 92px oklch(0.45 0.24 14),
      0 0 102px oklch(0.40 0.20 16),
      0 0 151px oklch(0.35 0.18 18);
    animation: nameBreath 2.5s ease-in-out infinite;
  }
  @keyframes nameBreath {
    0%, 100% { 
      text-shadow:
        0 0 7px oklch(0.65 0.30 8),
        0 0 10px oklch(0.65 0.30 8),
        0 0 21px oklch(0.60 0.28 8),
        0 0 42px oklch(0.55 0.28 10),
        0 0 82px oklch(0.50 0.26 12);
    }
    50% {
      text-shadow:
        0 0 10px oklch(0.70 0.32 6),
        0 0 20px oklch(0.70 0.32 6),
        0 0 40px oklch(0.65 0.30 8),
        0 0 80px oklch(0.60 0.28 10),
        0 0 120px oklch(0.55 0.26 12),
        0 0 160px oklch(0.50 0.24 14);
    }
  }

  /* 名字上方漂浮爱心 */
  .crown-hearts {
    position: absolute;
    top: -40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(20px, 3.5vw, 36px);
    animation: crownBob 2s ease-in-out infinite;
    white-space: nowrap;
    filter: drop-shadow(0 0 8px oklch(0.60 0.28 8));
  }
  @keyframes crownBob {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-14px); }
  }

  /* ── 爱心雨 ── */
  .rain-heart {
    position: fixed;
    font-size: clamp(14px, 2.5vw, 28px);
    pointer-events: none;
    z-index: 0;
    animation: heartRain var(--fall-dur) linear infinite;
    animation-delay: var(--fall-delay);
    opacity: 0.7;
    filter: drop-shadow(0 0 6px oklch(0.55 0.28 10 / 0.6));
  }
  @keyframes heartRain {
    0% { transform: translateY(-10vh) rotate(0deg) scale(0.8); opacity: 0; }
    5% { opacity: 0.8; }
    90% { opacity: 0.9; }
    100% { transform: translateY(110vh) rotate(var(--spin)) scale(1.1); opacity: 0; }
  }

  /* ── 整蛊按钮 ── */
  .prank-row {
    display: flex; flex-wrap: wrap; gap: clamp(14px, 2.5vw, 24px);
    justify-content: center; z-index: 3;
    margin: clamp(20px, 4vw, 40px) 0;
  }

  .btn {
    padding: clamp(14px, 2.2vw, 20px) clamp(28px, 3.5vw, 48px);
    font-size: clamp(15px, 1.8vw, 19px);
    font-weight: 700;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(8px);
  }

  .btn-primary {
    background: oklch(0.62 0.24 8 / 0.85);
    color: white;
    box-shadow: 0 0 20px oklch(0.55 0.26 10 / 0.5), 0 8px 24px oklch(0.40 0.18 12 / 0.3);
    animation: btnGlow 3s ease-in-out infinite;
  }
  .btn-primary:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px oklch(0.60 0.28 8 / 0.7), 0 12px 36px oklch(0.45 0.20 10 / 0.5);
  }
  .btn-primary:active { transform: scale(0.93); }
  @keyframes btnGlow {
    0%, 100% { box-shadow: 0 0 20px oklch(0.55 0.26 10 / 0.5), 0 8px 24px oklch(0.40 0.18 12 / 0.3); }
    50% { box-shadow: 0 0 35px oklch(0.60 0.30 8 / 0.65), 0 12px 32px oklch(0.45 0.22 10 / 0.45); }
  }

  .btn-secondary {
    background: oklch(0.22 0.03 5 / 0.7);
    color: var(--rose-300);
    border: 1.5px solid oklch(0.55 0.20 8 / 0.4);
    backdrop-filter: blur(12px);
  }
  .btn-secondary:hover {
    transform: scale(1.06);
    border-color: oklch(0.65 0.26 8 / 0.7);
    box-shadow: 0 0 24px oklch(0.55 0.22 10 / 0.3);
  }

  .btn-danger {
    background: oklch(0.55 0.28 15 / 0.8);
    color: white;
    animation: btnShake 4s ease-in-out infinite;
  }
  .btn-danger:hover { transform: scale(1.08); }
  @keyframes btnShake {
    0%, 80%, 100% { transform: rotate(0); }
    83% { transform: rotate(3deg); }
    86% { transform: rotate(-3deg); }
    89% { transform: rotate(1deg); }
    92% { transform: rotate(0); }
  }

  /* ── 右下角假系统提示 ── */
  .fake-toast {
    position: fixed; bottom: 24px; right: 24px;
    background: oklch(0.15 0.02 0 / 0.92);
    backdrop-filter: blur(16px);
    border: 1px solid oklch(0.55 0.20 8 / 0.3);
    border-radius: 14px;
    padding: 14px 20px;
    color: var(--rose-200);
    font-size: 13px;
    z-index: 100;
    box-shadow: 0 8px 32px oklch(0 0 0 / 0.5);
    animation: toastSlide 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: none;
    max-width: 280px;
    line-height: 1.5;
  }
  @keyframes toastSlide {
    0% { transform: translateX(120%); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }

  /* ── 弹窗 ── */
  #overlay {
    position: fixed; inset: 0;
    background: oklch(0.1 0.02 0 / 0.6);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #overlay.active { opacity: 1; pointer-events: all; }

  .modal {
    background: oklch(0.17 0.02 350);
    border: 1px solid oklch(0.50 0.18 8 / 0.3);
    border-radius: 24px;
    padding: clamp(28px, 5vw, 48px);
    text-align: center;
    max-width: 430px; width: 90%;
    box-shadow: 0 0 80px oklch(0.50 0.22 10 / 0.25), 0 20px 60px oklch(0 0 0 / 0.4);
    animation: modalPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes modalPop {
    0% { transform: scale(0.4) rotate(-5deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .modal .emoji { font-size: clamp(48px, 8vw, 72px); margin-bottom: 16px; }
  .modal h2 { font-size: clamp(20px, 3.5vw, 28px); color: var(--rose-300); margin-bottom: 12px; }
  .modal p { font-size: clamp(14px, 2vw, 17px); color: var(--rose-200); line-height: 1.7; margin-bottom: 22px; }
  .modal button {
    padding: 10px 40px; border-radius: 50px; border: none;
    background: var(--rose-400); color: white;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: transform 0.2s ease;
  }
  .modal button:hover { transform: scale(1.08); }

  /* ── 假进度条彩蛋 ── */
  .fake-progress {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: oklch(0.15 0.02 0 / 0.9);
    backdrop-filter: blur(12px);
    border: 1px solid oklch(0.50 0.18 8 / 0.3);
    border-radius: 12px;
    padding: 15px 24px;
    z-index: 200;
    font-size: 13px;
    color: var(--rose-200);
    display: none;
    box-shadow: 0 8px 32px oklch(0 0 0 / 0.5);
    width: 300px;
  }
  .fake-progress .bar-track {
    width: 100%; height: 6px;
    background: oklch(0.25 0.02 5);
    border-radius: 3px;
    margin-top: 8px;
  }
  .fake-progress .bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--rose-500), var(--rose-400));
    width: 0%;
    transition: width 0.3s ease;
  }

  /* 移动端适配 */
  @media (max-width: 640px) {
    .prank-row { flex-direction: column; align-items: center; }
    .btn { width: 80%; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<!-- 爱心雨层 -->
<div id="heartRainContainer"></div>

<!-- 光环 -->
<div class="aura-ring" style="top:50%;left:50%;transform:translate(-50%,-50%);"></div>
<div class="aura-ring" style="top:50%;left:50%;transform:translate(-50%,-50%);"></div>
<div class="aura-ring" style="top:50%;left:50%;transform:translate(-50%,-50%);"></div>

<div class="main-stage">
  <div class="name-shrine" id="nameShrine">
    <div class="crown-hearts">💖 💕 💗 💓 💝 💘 💖</div>
    <div class="name-main">江珊</div>
  </div>

  <div class="prank-row">
    <button class="btn btn-primary" onclick="openModal('love')">💘 点我表白 💘</button>
    <button class="btn btn-secondary" onclick="openModal('secret')">🤫 江珊的秘密</button>
    <button class="btn btn-danger" onclick="startVirusScan()">⚠️ 系统警告 ⚠️</button>
  </div>

  <div class="prank-row" style="margin-top:0;">
    <button class="btn btn-secondary" onclick="spawnExplosion()">💥 爱心核爆 💥</button>
    <button class="btn btn-primary" onclick="showToast()">📩 收到新消息</button>
  </div>
</div>

<!-- 假进度条 -->
<div class="fake-progress" id="fakeProgress">
  <div id="progressText">正在扫描：江珊可爱指数...</div>
  <div class="bar-track"><div class="bar-fill" id="progressBar"></div></div>
</div>

<!-- 假通知 -->
<div class="fake-toast" id="fakeToast"></div>

<!-- 弹窗 -->
<div id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="emoji" id="modalEmoji"></div>
    <h2 id="modalTitle"></h2>
    <p id="modalBody"></p>
    <button onclick="closeModal()">🥺 知道了</button>
  </div>
</div>

<script>
// ── Canvas 粒子 ──
const pc = document.getElementById('particleCanvas');
const pctx = pc.getContext('2d');
let particles = [];

function resizePC() { pc.width = window.innerWidth; pc.height = window.innerHeight; }
resizePC();
window.addEventListener('resize', resizePC);

class Particle {
  constructor() {
    this.reset(true);
    this.symbol = ['❤','💕','💗','💓','💖','💝','💘','✨','⭐','💫','🌟','♥'][Math.floor(Math.random()*12)];
  }
  reset(init) {
    this.x = Math.random() * pc.width;
    this.y = init ? Math.random() * pc.height : -50;
    this.size = 8 + Math.random() * 22;
    this.vy = 0.15 + Math.random() * 0.7;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.alpha = 0.15 + Math.random() * 0.3;
    this.phase = Math.random() * Math.PI * 2;
  }
  update() {
    this.y -= this.vy;
    this.x += this.vx + Math.sin(this.phase) * 0.3;
    this.phase += 0.01;
    if (this.y < -60) this.reset(false);
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.font = `${this.size}px sans-serif`;
    ctx.fillText(this.symbol, this.x, this.y);
    ctx.restore();
  }
}
for (let i = 0; i < 80; i++) particles.push(new Particle());
function animateParticles() {
  pctx.clearRect(0, 0, pc.width, pc.height);
  particles.forEach(p => { p.update(); p.draw(pctx); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ── 爱心雨 ──
const heartRain = document.getElementById('heartRainContainer');
const rainSymbols = ['💖','💕','💗','💓','💝','💘','❤️','💞'];
for (let i = 0; i < 30; i++) {
  const el = document.createElement('span');
  el.className = 'rain-heart';
  el.textContent = rainSymbols[Math.floor(Math.random() * rainSymbols.length)];
  el.style.left = Math.random() * 95 + '%';
  el.style.setProperty('--fall-dur', (6 + Math.random() * 10) + 's');
  el.style.setProperty('--fall-delay', -(Math.random() * 10) + 's');
  el.style.setProperty('--spin', (Math.random() * 720 - 360) + 'deg');
  heartRain.appendChild(el);
}

// ── 弹窗 ──
const modalData = {
  love: { emoji:'😍💕', title:'表白成功！', body:'江珊已收到你的爱心<br>好感度 +999999 ❤️<br><br>（然而这只是个整蛊页面 😈）' },
  secret: { emoji:'🤫😈', title:'江珊的惊天秘密', body:'据不可靠消息透露：<br>江珊其实是<br>💖 爱心星球的公主 💖<br>来到地球散播可爱能量！' },
};

function openModal(type) {
  const d = modalData[type];
  document.getElementById('modalEmoji').textContent = d.emoji;
  document.getElementById('modalTitle').textContent = d.title;
  document.getElementById('modalBody').innerHTML = d.body;
  document.getElementById('overlay').classList.add('active');
}
function closeModal() { document.getElementById('overlay').classList.remove('active'); }

// ── 假病毒扫描 ──
function startVirusScan() {
  const bar = document.getElementById('fakeProgress');
  const fill = document.getElementById('progressBar');
  const text = document.getElementById('progressText');
  bar.style.display = 'block';
  fill.style.width = '0%';
  const stages = [
    { p: 15, t: '正在扫描：江珊可爱指数...' },
    { p: 35, t: '检测到大量爱心病毒 💖' },
    { p: 58, t: '警告：好感度严重超标！' },
    { p: 78, t: '尝试清除... 清除失败 ❌' },
    { p: 92, t: '系统已被爱心占领 💘' },
    { p: 100, t: '✅ 扫描完成：江珊 = 100% 可爱' },
  ];
  stages.forEach((s, i) => {
    setTimeout(() => { text.textContent = s.t; fill.style.width = s.p + '%'; }, i * 700);
  });
  setTimeout(() => { bar.style.display = 'none'; }, 3500);
}

// ── 假通知 ──
const toasts = [
  '💌 江珊给你发了一条消息：<br>"哈哈被骗了吧！"',
  '⚠️ 系统提示：<br>你的桌面已被爱心入侵',
  '📱 微信新消息：<br>江珊：[动画表情] 💖',
  '🔔 提醒：<br>江珊的可爱光环持续生效中',
];
function showToast() {
  const t = document.getElementById('fakeToast');
  t.innerHTML = toasts[Math.floor(Math.random() * toasts.length)];
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3500);
}

// ── 爱心核爆 ──
function spawnExplosion() {
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const el = document.createElement('span');
      el.style.cssText = `
        position:fixed; pointer-events:none; z-index:9998;
        font-size:${16 + Math.random()*40}px;
        left:${35 + Math.random()*30}%; top:${30 + Math.random()*20}%;
        animation:explode ${1.2 + Math.random()*1.5}s cubic-bezier(0,0.8,0.3,1) forwards;
      `;
      el.textContent = ['💖','💕','💗','💝','💘','💥','✨','🌟'][Math.floor(Math.random()*8)];
      const angle = Math.random() * Math.PI * 2;
      const dist = 80 + Math.random() * 250;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      const rot = (Math.random() - 0.5) * 720;
      
      const styleEl = document.createElement('style');
      styleEl.textContent = `
        @keyframes explode {
          0% { transform: translate(0,0) scale(0.3) rotate(0deg); opacity:1; }
          100% { transform: translate(${dx}px,${dy}px) scale(1.3) rotate(${rot}deg); opacity:0; }
        }
      `;
      document.head.appendChild(styleEl);
      document.body.appendChild(el);
      setTimeout(() => { el.remove(); styleEl.remove(); }, 3000);
    }, i * 40);
  }
}

// ── 键盘彩蛋 ──
document.addEventListener('keydown', e => {
  if (e.key.toLowerCase() === 'j') spawnExplosion();
});

// ── 名字点击彩蛋 ──
document.getElementById('nameShrine').addEventListener('click', spawnExplosion);
</script>

</body>
</html>
