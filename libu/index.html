<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍬 李埠 🍬</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --candy-100: oklch(0.95 0.04 0);
    --candy-200: oklch(0.88 0.09 2);
    --candy-300: oklch(0.80 0.14 4);
    --candy-400: oklch(0.68 0.20 6);
    --candy-500: oklch(0.55 0.26 8);
    --candy-600: oklch(0.42 0.22 10);
    --purple: oklch(0.55 0.28 330);
    --bg-top: oklch(0.94 0.06 0);
    --bg-mid: oklch(0.90 0.10 350);
    --bg-bot: oklch(0.88 0.12 5);
  }

  body {
    min-height: 100vh;
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 40%, oklch(0.96 0.04 340) 70%, oklch(0.94 0.06 355) 100%);
    font-family: 'PingFang SC', 'Microsoft YaHei', 'HarmonyOS Sans', sans-serif;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── 背景圆点纹理 ── */
  .dot-pattern {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(oklch(0.75 0.12 4 / 0.18) 1.5px, transparent 1.5px);
    background-size: 32px 32px;
  }

  /* ── 浮动泡泡 ── */
  .bubble {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
    animation: bubbleFloat var(--b-dur) ease-in-out infinite;
    animation-delay: var(--b-delay);
    opacity: 0.5;
  }
  @keyframes bubbleFloat {
    0%, 100% { transform: translateY(0) translateX(0) scale(1); }
    25% { transform: translateY(-30px) translateX(15px) scale(1.1); }
    50% { transform: translateY(-10px) translateX(-10px) scale(0.95); }
    75% { transform: translateY(-40px) translateX(-20px) scale(1.05); }
  }

  /* ── 主容器 ── */
  .stage {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
    padding: clamp(20px, 4vw, 50px) clamp(16px, 3vw, 40px);
  }

  /* ── 顶部彩带 ── */
  .ribbon-top {
    font-size: clamp(22px, 3.5vw, 40px);
    letter-spacing: 0.25em;
    animation: ribbonShake 2.5s ease-in-out infinite;
  }
  @keyframes ribbonShake {
    0%, 100% { transform: rotate(0deg); }
    15% { transform: rotate(1deg); }
    30% { transform: rotate(-1deg); }
    45% { transform: rotate(0.5deg); }
    60% { transform: rotate(0deg); }
  }

  /* ── 环绕爱心轨道 ── */
  .orbit-container {
    position: relative;
    width: clamp(260px, 50vw, 500px);
    height: clamp(260px, 50vw, 500px);
    margin: clamp(20px, 5vw, 50px) 0;
  }
  .orbit-ring {
    position: absolute; inset: -10%;
    border-radius: 50%;
    border: 2px dashed oklch(0.70 0.16 6 / 0.35);
    animation: orbitSpin 20s linear infinite;
  }
  .orbit-ring:nth-child(2) {
    inset: -20%;
    animation-duration: 28s;
    animation-direction: reverse;
    border-color: oklch(0.65 0.20 340 / 0.25);
  }
  .orbit-heart {
    position: absolute;
    font-size: clamp(18px, 3vw, 30px);
    animation: orbitPulse 2s ease-in-out infinite;
    filter: drop-shadow(0 2px 6px oklch(0.60 0.20 6 / 0.4));
  }
  @keyframes orbitSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes orbitPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.4); }
  }

  /* ── 名字主体 ── */
  .name-block {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
  }
  .name-text {
    font-size: clamp(60px, 14vw, 160px);
    font-weight: 900;
    letter-spacing: clamp(6px, 2vw, 20px);
    text-align: center;
    line-height: 1;
    /* 糖果渐变 */
    background: linear-gradient(180deg,
      oklch(0.58 0.28 6) 0%,
      oklch(0.50 0.30 350) 40%,
      oklch(0.55 0.26 10) 70%,
      oklch(0.48 0.28 355) 100%
    );
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 6px 18px oklch(0.45 0.18 8 / 0.4));
    animation: nameBounce 1.6s cubic-bezier(0.28, 0.84, 0.42, 1) infinite;
  }
  @keyframes nameBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-12px) scale(1.04); }
    50% { transform: translateY(0) scale(0.98); }
    70% { transform: translateY(-6px) scale(1.02); }
  }

  /* ── 名字周围浮动小表情 ── */
  .floater {
    position: absolute;
    font-size: clamp(16px, 3vw, 30px);
    pointer-events: none;
    animation: floaterBob var(--f-dur) ease-in-out infinite;
    animation-delay: var(--f-delay);
  }
  @keyframes floaterBob {
    0%, 100% { transform: translateY(0) scale(1); }
    33% { transform: translateY(-18px) scale(1.2); }
    66% { transform: translateY(6px) scale(0.9); }
  }

  /* ── 按钮区 ── */
  .btn-zone {
    display: flex; flex-wrap: wrap; gap: clamp(14px, 2.2vw, 22px);
    justify-content: center; z-index: 3;
    margin: clamp(20px, 3vw, 30px) 0;
  }
  .candy-btn {
    padding: clamp(12px, 1.8vw, 18px) clamp(24px, 3.2vw, 44px);
    font-size: clamp(15px, 1.6vw, 18px);
    font-weight: 700;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  .btn-main {
    background: linear-gradient(135deg, var(--candy-400), var(--candy-500));
    color: white;
    box-shadow: 0 6px 22px oklch(0.50 0.20 8 / 0.35);
  }
  .btn-main:hover { transform: scale(1.1) translateY(-3px); box-shadow: 0 10px 30px oklch(0.50 0.24 8 / 0.5); }
  .btn-main:active { transform: scale(0.94); }

  .btn-outline {
    background: oklch(1 0 0 / 0.5);
    backdrop-filter: blur(8px);
    color: var(--candy-600);
    border: 2px solid oklch(0.72 0.18 6 / 0.5);
    animation: btnHint 4s ease-in-out infinite;
  }
  .btn-outline:hover { transform: scale(1.08); border-color: var(--candy-400); background: oklch(0.98 0.04 5 / 0.7); }
  @keyframes btnHint {
    0%, 80%, 100% { transform: scale(1); }
    85% { transform: scale(1.04); }
    90% { transform: scale(0.97); }
    95% { transform: scale(1.01); }
  }

  .btn-wild {
    background: linear-gradient(135deg, oklch(0.58 0.28 15), oklch(0.52 0.26 20));
    color: white;
    animation: btnWiggle 2.6s ease-in-out infinite;
  }
  .btn-wild:hover { transform: scale(1.1); }
  @keyframes btnWiggle {
    0%, 95%, 100% { transform: rotate(0); }
    96% { transform: rotate(4deg); }
    97% { transform: rotate(-3deg); }
    98% { transform: rotate(2deg); }
    99% { transform: rotate(0); }
  }

  /* ── 假倒计时条 ── */
  .countdown-bar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--candy-400), var(--purple), var(--candy-500));
    z-index: 300;
    transform: scaleX(0); transform-origin: left;
    transition: transform 8s linear;
    border-radius: 0 2px 2px 0;
    display: none;
  }
  .countdown-label {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    background: oklch(0.96 0.04 5 / 0.9);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 13px;
    font-weight: 700;
    color: var(--candy-600);
    z-index: 301;
    box-shadow: 0 2px 12px oklch(0.40 0.10 8 / 0.15);
    display: none;
  }

  /* ── 假弹窗 ── */
  #overlay {
    position: fixed; inset: 0;
    background: oklch(0.15 0.02 0 / 0.5);
    backdrop-filter: blur(5px);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  #overlay.active { opacity: 1; pointer-events: all; }
  .dialog {
    background: oklch(0.98 0.04 5);
    border-radius: 28px;
    padding: clamp(28px, 5vw, 44px);
    text-align: center;
    max-width: 420px; width: 90%;
    box-shadow: 0 20px 60px oklch(0.30 0.05 8 / 0.3);
    animation: dialogIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes dialogIn {
    0% { transform: scale(0.3) rotate(8deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .dialog .d-emoji { font-size: clamp(48px, 8vw, 68px); margin-bottom: 14px; }
  .dialog h2 { font-size: clamp(20px, 3.2vw, 26px); color: var(--candy-500); margin-bottom: 10px; }
  .dialog p { font-size: clamp(14px, 1.8vw, 16px); color: var(--candy-400); line-height: 1.7; margin-bottom: 20px; }
  .dialog button {
    padding: 10px 40px; border-radius: 50px; border: none;
    background: linear-gradient(135deg, var(--candy-400), var(--candy-500));
    color: white; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: transform 0.2s ease;
  }
  .dialog button:hover { transform: scale(1.08); }

  /* ── 爱心喷泉 ── */
  .geyser-heart {
    position: fixed;
    font-size: clamp(16px, 3vw, 30px);
    pointer-events: none;
    z-index: 9998;
    animation: geyser var(--g-dur) cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
  }
  @keyframes geyser {
    0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
    60% { opacity: 0.9; }
    100% { transform: translateY(var(--g-y)) translateX(var(--g-x)) scale(1.2) rotate(var(--g-spin)); opacity: 0; }
  }

  .bottom-ribbon {
    font-size: clamp(18px, 2.5vw, 30px);
    letter-spacing: 0.3em;
    margin-top: auto;
    padding: 30px 0 10px;
    opacity: 0.6;
  }

  @media (max-width: 640px) {
    .orbit-container { width: 80vw; height: 80vw; }
    .btn-zone { flex-direction: column; align-items: center; }
    .candy-btn { width: 70%; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="dot-pattern"></div>

<!-- 浮动泡泡 -->
<div id="bubbleZone"></div>

<!-- 假倒计时 -->
<div class="countdown-bar" id="countdownBar"></div>
<div class="countdown-label" id="countdownLabel"></div>

<div class="stage">
  <div class="ribbon-top">🌸 🎀 💖 🌸 🎀 💖 🌸</div>

  <div class="orbit-container">
    <div class="orbit-ring">
      <span class="orbit-heart" style="top:0;left:50%;transform:translate(-50%,-50%);animation-delay:0s;">💖</span>
      <span class="orbit-heart" style="top:50%;right:0;transform:translate(50%,-50%);animation-delay:0.5s;">💕</span>
      <span class="orbit-heart" style="bottom:0;left:50%;transform:translate(-50%,50%);animation-delay:1s;">💗</span>
      <span class="orbit-heart" style="top:50%;left:0;transform:translate(-50%,-50%);animation-delay:1.5s;">💝</span>
    </div>
    <div class="orbit-ring">
      <span class="orbit-heart" style="top:0;left:50%;transform:translate(-50%,-50%);animation-delay:0.2s;">💘</span>
      <span class="orbit-heart" style="top:25%;right:0;transform:translate(50%,-50%);animation-delay:0.7s;">💓</span>
      <span class="orbit-heart" style="bottom:25%;right:0;transform:translate(50%,50%);animation-delay:1.2s;">💖</span>
      <span class="orbit-heart" style="bottom:0;left:50%;transform:translate(-50%,50%);animation-delay:1.7s;">💕</span>
      <span class="orbit-heart" style="bottom:25%;left:0;transform:translate(-50%,50%);animation-delay:0.4s;">💗</span>
      <span class="orbit-heart" style="top:25%;left:0;transform:translate(-50%,-50%);animation-delay:1.0s;">💝</span>
    </div>
    <div class="name-block">
      <span class="floater" style="top:-35px;left:-25px;--f-dur:2.2s;--f-delay:0s;">✨</span>
      <span class="floater" style="top:-28px;right:-30px;--f-dur:2.8s;--f-delay:0.6s;">💫</span>
      <span class="floater" style="bottom:-22px;left:-15px;--f-dur:2.5s;--f-delay:1.1s;">⭐</span>
      <span class="floater" style="bottom:-30px;right:-20px;--f-dur:3s;--f-delay:1.6s;">🌟</span>
      <span class="floater" style="top:35%;left:-40px;--f-dur:2.6s;--f-delay:0.3s;">🌸</span>
      <span class="floater" style="top:55%;right:-38px;--f-dur:2.4s;--f-delay:0.9s;">🎀</span>
      <span class="name-text">李埠</span>
    </div>
  </div>

  <div class="btn-zone">
    <button class="candy-btn btn-main" onclick="openDialog('crush')">💘 暗恋李埠</button>
    <button class="candy-btn btn-outline" onclick="openDialog('truth')">🤔 真相揭晓</button>
    <button class="candy-btn btn-wild" onclick="startCountdown()">⏳ 别按！会爆炸</button>
  </div>
  <div class="btn-zone" style="margin-top:0;">
    <button class="candy-btn btn-outline" onclick="spawnGeyser()">💥 爱心喷泉</button>
    <button class="candy-btn btn-main" onclick="openDialog('game')">🎰 抽奖转盘</button>
  </div>

  <div class="bottom-ribbon">💖 💕 💗 💓 💝 💘 💖 💕</div>
</div>

<!-- 弹窗 -->
<div id="overlay" onclick="if(event.target===this)closeDialog()">
  <div class="dialog">
    <div class="d-emoji" id="dEmoji"></div>
    <h2 id="dTitle"></h2>
    <p id="dBody"></p>
    <button onclick="closeDialog()">😅 好嘞</button>
  </div>
</div>

<script>
// ── 浮动泡泡 ──
const bubbleZone = document.getElementById('bubbleZone');
const bubbleColors = [
  'oklch(0.78 0.16 4 / 0.35)',
  'oklch(0.72 0.20 340 / 0.30)',
  'oklch(0.76 0.18 8 / 0.32)',
  'oklch(0.70 0.22 350 / 0.25)',
  'oklch(0.80 0.14 6 / 0.30)',
];
for (let i = 0; i < 22; i++) {
  const b = document.createElement('div');
  b.className = 'bubble';
  const size = 20 + Math.random() * 60;
  b.style.width = size + 'px';
  b.style.height = size + 'px';
  b.style.background = bubbleColors[Math.floor(Math.random() * bubbleColors.length)];
  b.style.left = Math.random() * 88 + '%';
  b.style.top = Math.random() * 90 + '%';
  b.style.setProperty('--b-dur', (4 + Math.random() * 8) + 's');
  b.style.setProperty('--b-delay', -(Math.random() * 6) + 's');
  bubbleZone.appendChild(b);
}

// ── 弹窗内容 ──
const dialogs = {
  crush: { emoji:'😍💌', title:'暗恋申请已提交', body:'恭喜！你对李埠的暗恋<br>已进入排队序列<br><br>当前排位：第 999999 位 😈<br>预计等待：永远' },
  truth: { emoji:'🤯💡', title:'李埠的真实身份', body:'经过 AI 分析（瞎编的）：<br><br>李埠 = "李" + "埠"<br>= 李子柒 + 港口城市<br>= 💖 可爱与霸气的结合体 💖<br><br>🤔 这分析靠谱吗？不靠谱。' },
  game: { emoji:'🎰💖', title:'恭喜中奖！', body:'🎉 你抽中了<br><br>🏆 特等奖 🏆<br><br>奖品：李埠的虚拟拥抱 x1<br>（仅限本页面内有效）<br><br>💝 请截图保存此奖品 💝' },
};

function openDialog(key) {
  const d = dialogs[key];
  document.getElementById('dEmoji').textContent = d.emoji;
  document.getElementById('dTitle').textContent = d.title;
  document.getElementById('dBody').innerHTML = d.body;
  document.getElementById('overlay').classList.add('active');
}
function closeDialog() { document.getElementById('overlay').classList.remove('active'); }

// ── 假倒计时 ──
function startCountdown() {
  const bar = document.getElementById('countdownBar');
  const label = document.getElementById('countdownLabel');
  bar.style.display = 'block';
  label.style.display = 'block';
  label.textContent = '⚠️ 李埠可爱能量充能中... 0%';
  
  const updates = [
    { p: 20, t: '⚠️ 李埠可爱能量充能中... 20%' },
    { p: 45, t: '⚠️ 检测到大量魅力辐射... 45%' },
    { p: 65, t: '💥 警告：可爱值即将溢出！65%' },
    { p: 85, t: '💥 系统即将崩溃... 85%' },
    { p: 99, t: '💥 3... 2... 1...' },
  ];
  
  requestAnimationFrame(() => { bar.style.transform = 'scaleX(1)'; });
  
  updates.forEach((u, i) => {
    setTimeout(() => { label.textContent = u.t; }, (i + 1) * 1300);
  });
  
  setTimeout(() => {
    label.textContent = '🎉 充能完成！李埠可爱值 = ∞';
    spawnGeyser();
  }, 6700);
  
  setTimeout(() => {
    bar.style.display = 'none';
    bar.style.transform = 'scaleX(0)';
    label.style.display = 'none';
  }, 9000);
}

// ── 爱心喷泉 ──
function spawnGeyser() {
  for (let i = 0; i < 35; i++) {
    setTimeout(() => {
      const el = document.createElement('span');
      el.className = 'geyser-heart';
      el.textContent = ['💖','💕','💗','💝','💘','💓','💥','✨','🌟'][Math.floor(Math.random() * 9)];
      el.style.left = (30 + Math.random() * 40) + '%';
      el.style.top = (40 + Math.random() * 20) + '%';
      const angle = Math.random() * Math.PI * 2;
      const dist = 100 + Math.random() * 300;
      el.style.setProperty('--g-x', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--g-y', Math.sin(angle) * dist - 100 + 'px');
      el.style.setProperty('--g-spin', (Math.random() * 720 - 360) + 'deg');
      el.style.setProperty('--g-dur', (1.2 + Math.random() * 1.8) + 's');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i * 45);
  }
}

// ── 名字点击彩蛋 ──
document.querySelector('.name-block').addEventListener('click', spawnGeyser);

// ── 键盘彩蛋 ──
document.addEventListener('keydown', e => {
  if (e.key.toLowerCase() === 'l') spawnGeyser();
});
</script>

</body>
</html>
